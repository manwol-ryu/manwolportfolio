<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트폴리오</title>
<meta id="site-desc" name="description" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<button class="menu-toggle" id="menu-toggle" aria-label="메뉴 열기" aria-expanded="false" aria-controls="sidebar">
  <span class="menu-icon"></span>
</button>
<div class="sidebar-scrim" id="sidebar-scrim"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar" aria-label="사이드 내비게이션">
    <div class="sidebar-head">
      <div class="sidebar-logo" id="sidebar-logo"></div>
      <div class="sidebar-tag" id="sidebar-tag"></div>
    </div>
    <nav class="sidebar-nav">
      <a href="#home" class="sidebar-item on" id="sidebar-home">홈</a>

      <div class="sidebar-section" id="sidebar-section-types"></div>
      <div id="sidebar-types" class="sidebar-group"></div>

      <div class="sidebar-section" id="sidebar-section-streamers"></div>
      <div id="sidebar-streamers" class="sidebar-group"></div>

      <div class="sidebar-section" id="sidebar-section-links"></div>
      <div id="sidebar-links" class="sidebar-group"></div>
    </nav>
    <div class="sidebar-footer">
      <a href="#pricing" class="sidebar-cost" id="sidebar-cost"></a>
    </div>
  </aside>

  <main class="main">

    <section id="home" class="hero">
      <div class="hero-text">
        <div class="hero-eyebrow" id="hero-eyebrow"></div>
        <h1 class="hero-title" id="hero-title"></h1>
        <p class="hero-sub" id="hero-sub"></p>

        <div class="hero-meta">
          <div class="hero-contact" id="hero-contact"></div>
          <div class="hero-career" id="hero-career"></div>
          <div class="hero-tools" id="hero-tools"></div>
        </div>

        <div class="hero-actions" id="hero-actions"></div>
      </div>
      <div class="hero-deco" id="hero-deco" aria-hidden="true"></div>
    </section>

    <section class="featured">
      <div class="featured-inner">
        <div class="section-head">
          <h2 class="section-title" id="featured-title"></h2>
          <div class="section-desc" id="featured-desc"></div>
        </div>
        <div class="video-wrap">
          <iframe
            id="featured-iframe"
            src=""
            title=""
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen></iframe>
        </div>
      </div>
    </section>

    <section id="works" class="gallery">
      <div class="section-head">
        <h2 class="section-title" id="gallery-title"></h2>
        <div class="section-desc" id="gallery-desc"></div>
      </div>
      <div class="gallery-filters" id="gallery-filters" role="toolbar" aria-label="갤러리 필터"></div>
      <div class="gallery-grid" id="gallery-grid"></div>
      <div class="gallery-empty" id="gallery-empty" hidden></div>
    </section>

    <section class="more-works">
      <div class="section-head">
        <h2 class="section-title" id="moreworks-title"></h2>
      </div>
      <a id="channel-card" href="#" target="_blank" rel="noopener" class="channel-card">
        <div class="channel-icon" id="channel-icon">📺</div>
        <div class="channel-info">
          <div class="channel-name" id="channel-name"></div>
          <div class="channel-sub" id="channel-sub"></div>
        </div>
        <div class="channel-arrow" aria-hidden="true">↗</div>
      </a>
    </section>

    <section class="worklog">
      <div class="section-head">
        <h2 class="section-title" id="worklog-title"></h2>
        <div class="section-desc" id="worklog-desc"></div>
      </div>
      <div class="log-list" id="log-list"></div>
    </section>

    <section id="pricing" class="pricing">
      <div class="section-head">
        <h2 class="section-title" id="pricing-title"></h2>
        <div class="section-desc" id="pricing-desc"></div>
      </div>
      <div class="price-grid" id="price-grid"></div>
      <div class="price-notes" id="price-notes"></div>
    </section>

    <section class="free-content" id="free-content" hidden></section>

    <footer class="site-footer">
      <div class="footer-logo" id="footer-logo"></div>
      <div class="footer-links" id="footer-links"></div>
      <div class="footer-copy" id="footer-copy"></div>
    </footer>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
